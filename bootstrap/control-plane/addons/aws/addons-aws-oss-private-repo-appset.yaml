---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-private-repo
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: akuity.io/argo-cd-cluster-name
              operator: NotIn
              values: [in-cluster]
            - key: enable_private_addons
              operator: In
              values: ['true']
  template:
    metadata:
      name: 'addons-{{name}}-private'
    spec:
      project: default
      source:
        repoURL: '{{metadata.annotations.private_addons_repo_url}}'
        targetRevision: '{{metadata.annotations.private_addons_repo_revision}}'
        path: '{{metadata.annotations.private_addons_repo_path}}'
        directory:
          recurse: true
      destination:
        namespace: argocd
        name: '{{name}}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - ServerSideApply=true
