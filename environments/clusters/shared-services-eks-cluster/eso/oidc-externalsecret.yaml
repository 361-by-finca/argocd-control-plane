---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
  data:
    - secretKey: clientId
      remoteRef:
        key: /argocd/hub/oidc
        property: clientId
    - secretKey: clientSecret
      remoteRef:
        key: /argocd/hub/oidc
        property: clientSecret
