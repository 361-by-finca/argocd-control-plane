---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-github-app
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-github-app
  data:
    - secretKey: appId
      remoteRef:
        key: /argocd/hub/github-app
        property: appId
    - secretKey: installationId
      remoteRef:
        key: /argocd/hub/github-app
        property: installationId
    - secretKey: privateKey
      remoteRef:
        key: /argocd/hub/github-app
        property: privateKey
